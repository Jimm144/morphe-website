<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Page Not Found | Morphe</title>
    <script>
      !(function () {
        try {
          const e = localStorage.getItem('morphe-theme') || 'auto',
            t = window.matchMedia('(prefers-color-scheme: dark)').matches,
            o = 'auto' === e ? (t ? 'dark' : 'light') : e;
          document.documentElement.setAttribute('data-theme', o);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>document.documentElement.classList.add("i18n-loading")</script>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .err-container {
        max-width: 600px;
        width: 100%;
      }
      .err-code {
        font-size: clamp(7rem, 18vw, 11rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.05em;
        color: var(--md-on-surface-variant);
        margin-bottom: 8px;
      }
      .err-title {
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--md-on-surface);
        margin-bottom: 12px;
      }
      .err-desc {
        font-size: 1.0625rem;
        color: var(--md-on-surface-variant);
        line-height: 1.6;
        margin: 0 auto 32px;
        max-width: 480px;
      }
      .err-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="err-container">
      <div class="err-code">404</div>
      <h1 class="err-title" data-i18n="error.404-title">404 - Page Not Found</h1>
      <p class="err-desc" data-i18n="error.not-found">
        The page you're looking for can't be found.
      </p>
      <div class="err-actions">
        <a href="index.html" class="btn-filled" data-i18n="error.go-home">Go to homepage</a>
        <button onclick="window.history.back()" class="btn-tonal" data-i18n="error.go-back">Go Back</button>
      </div>
    </div>

    <script>
      (function () {
        const SUPPORTED = ['en','ar','cs-CZ','de-DE','es-ES','fr-FR','it-IT','ja-JP','ko-KR','nl-NL','pl-PL','pt-BR','pt-PT','ru-RU','sk-SK','tr-TR','uk-UA','vi-VN','zh-CN','zh-TW'];
        function pickLang() {
          const saved = localStorage.getItem('morphe-language');
          if (saved && SUPPORTED.includes(saved)) return saved;
          const browser = navigator.language || 'en';
          if (SUPPORTED.includes(browser)) return browser;
          const base = browser.split('-')[0];
          const regional = SUPPORTED.find((l) => l.startsWith(base + '-'));
          if (regional) return regional;
          if (SUPPORTED.includes(base)) return base;
          return 'en';
        }
        function getNested(obj, key) {
          let cur = obj;
          for (const part of key.split('.')) {
            if (cur && typeof cur === 'object') cur = cur[part];
            else return null;
          }
          return typeof cur === 'string' ? cur : null;
        }
        function applyOnce(translations) {
          document.querySelectorAll('[data-i18n]').forEach((el) => {
            const val = getNested(translations, el.getAttribute('data-i18n'));
            if (val) el.textContent = val;
          });
          document.documentElement.classList.remove('i18n-loading');
        }
        const lang = pickLang();
        document.documentElement.lang = lang;
        const rtl = ['ar', 'he', 'fa', 'ur'];
        document.documentElement.dir = rtl.includes(lang.split('-')[0]) ? 'rtl' : 'ltr';
        fetch('locales/' + lang + '.json')
          .then((r) => (r.ok ? r.json() : Promise.reject()))
          .then(applyOnce)
          .catch(() => {
            if (lang !== 'en') {
              fetch('locales/en.json')
                .then((r) => r.json())
                .then(applyOnce)
                .catch(() => {
                  document.documentElement.classList.remove('i18n-loading');
                });
            } else {
              document.documentElement.classList.remove('i18n-loading');
            }
          });
        setTimeout(() => {
          document.documentElement.classList.remove('i18n-loading');
        }, 2000);
      })();
    </script>
  </body>
</html>
